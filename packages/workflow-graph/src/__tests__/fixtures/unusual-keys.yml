name: "Unusual but Valid Keys"
run-name: "Run for ${{ github.actor }}"
on: [push, pull_request]
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
env:
  NODE_ENV: production
jobs:
  "build-and-test":
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - id: run-tests
        name: "Run tests"
        shell: bash
        working-directory: ./app
        run: |
          npm ci
          npm test
        continue-on-error: true
        timeout-minutes: 5
