name: Conditional Job
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: npm run build
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - run: npm run deploy
  notify:
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: echo notify
